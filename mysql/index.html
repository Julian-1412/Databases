<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SQL Web Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Consola SQL Interactiva</h1>
        
        <div class="input-area">
            <textarea id="sqlInput" placeholder="Escribe tu comando SQL aquí... (ej: SELECT * FROM usuarios)"></textarea>
            <button id="btnEjecutar">Ejecutar Comando</button>
        </div>

        <div id="statusMessage"></div>

        <div class="output-area">
            <h3>Resultado:</h3>
            <div id="resultTableContainer">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
